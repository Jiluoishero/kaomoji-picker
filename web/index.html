<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaomoji Picker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- Title Bar -->
        <div id="titlebar">
            <div id="mode-indicator">
                <span id="mode-dot"></span>
                <span id="mode-text">单次</span>
            </div>
            <div id="titlebar-actions">
                <button id="btn-add" class="titlebar-btn" title="添加符号">
                    <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                        <path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                </button>
                <button id="btn-settings" class="titlebar-btn" title="设置">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none">
                        <path d="M12 15a3 3 0 100-6 3 3 0 000 6z" stroke="currentColor" stroke-width="2"/>
                        <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z" stroke="currentColor" stroke-width="2"/>
                    </svg>
                </button>
                <button id="btn-close" class="titlebar-btn btn-close-x" title="关闭">
                    <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
                        <path d="M1 1l10 10M11 1L1 11" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                </button>
            </div>
        </div>

        <!-- Main View -->
        <div id="main-view" class="view active-view">
            <div id="tabs-container">
                <div id="tabs-scroll"></div>
                <button id="btn-add-group-edit" class="tab-add-btn hidden" title="添加分组">+</button>
            </div>

            <div id="add-area" class="collapsed">
                <textarea id="add-textarea" placeholder="每行输入一个符号…" rows="4"></textarea>
                <div id="add-actions">
                    <button id="btn-add-cancel" class="btn-small btn-ghost">取消</button>
                    <button id="btn-add-confirm" class="btn-small btn-accent">确认添加</button>
                </div>
            </div>

            <div id="grid-container">
                <div id="symbol-grid"></div>
            </div>
        </div>

        <!-- Settings View -->
        <div id="settings-view" class="view">
            <div class="settings-header">
                <button id="btn-settings-back" class="titlebar-btn" title="返回">
                    <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                        <path d="M10 1L4 7l6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
                <span class="settings-title">设置</span>
            </div>

            <div class="settings-body">
                <div class="setting-card">
                    <div class="setting-row">
                        <div class="setting-info">
                            <span class="setting-label">快捷键</span>
                            <span class="setting-desc">全局唤起面板</span>
                        </div>
                        <button id="hotkey-btn" class="hotkey-display">
                            <span id="hotkey-text">Ctrl + `</span>
                        </button>
                    </div>
                </div>

                <div class="setting-card">
                    <div class="setting-row">
                        <div class="setting-info">
                            <span class="setting-label">开机自启</span>
                            <span class="setting-desc">登录 Windows 后自动运行</span>
                        </div>
                        <label class="toggle-switch">
                            <input type="checkbox" id="toggle-autostart">
                            <span class="toggle-slider"></span>
                        </label>
                    </div>
                </div>

                <div class="setting-card">
                    <div class="setting-row">
                        <div class="setting-info">
                            <span class="setting-label">编辑模式</span>
                            <span class="setting-desc">拖拽分组、删除符号</span>
                        </div>
                        <label class="toggle-switch">
                            <input type="checkbox" id="toggle-editmode">
                            <span class="toggle-slider"></span>
                        </label>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
